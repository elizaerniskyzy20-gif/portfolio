<!DOCTYPE html>
<html lang="ky">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Эрнис кызы Элиза | Портфолио</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #fdfaf5;
    }

    .pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.1);}
      100% {transform: scale(1);}
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: gold;
    }
  </style>
</head>

<body>

<div class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-4xl w-full grid md:grid-cols-2 gap-8">

    <!-- Сол жак -->
    <div>
      <h1 class="text-4xl font-bold mb-2">Эрнис кызы Элиза</h1>
      <p class="text-sm text-gray-600">Тарых мугалими</p>

      <p class="mt-4 italic">
        “Тарых — бул келечектин күзгүсү.”
      </p>

      <div class="grid grid-cols-3 gap-3 mt-6">
        <div class="card">📇 Визитка</div>
        <div class="card">🌿 Мен жөнүндө</div>
        <div class="card">📂 Кейс</div>
        <div class="card">📖 Сабактар</div>
        <div class="card">📜 Ийгиликтер</div>
        <div class="card">🎮 Оюндар</div>
      </div>
    </div>

    <!-- Оң жак -->
    <div class="text-center">
      <img src="eliza1.jpeg" class="pulse mx-auto rounded-xl mb-4" width="250">

      <video width="250" autoplay muted loop class="mx-auto rounded-xl">
        <source src="eliza2.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</div>

</body>
</html>
